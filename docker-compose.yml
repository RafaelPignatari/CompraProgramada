services:
  mysql:
    image: mysql:8.0.45
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: CompraProgramadaDB
      MYSQL_USER: rafael
      MYSQL_PASSWORD: souumasenhadeteste
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network

  kafka:
    image: confluentinc/cp-kafka:8.0.4
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://localhost:9092'
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093'
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_BYTES: 1073741824 # 1GB
      CLUSTER_ID: 'MkU3OEVBNTNEQ0MyRUQ4' # A static, base64-encoded random UUID (can be generated via bin/kafka-storage.sh random-uuid)
    volumes:
      - ./kafka_data:/var/lib/kafka/data

volumes:
  mysql_data:
  kafka_data:

networks:
  app-network:
    driver: bridge
